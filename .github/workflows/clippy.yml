name: Clippy

on: [push, workflow_dispatch]

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.12"
    - name: Run Clippy
      run: uv run cargo clippy --lib -- -D warnings
