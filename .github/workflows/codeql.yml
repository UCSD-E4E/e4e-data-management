name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [csharp, python]

    steps:
    - uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    - if: matrix.language == 'csharp'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "10.0.x"

    - if: matrix.language == 'csharp'
      name: Build (sequential to avoid reference assembly race)
      run: |
        dotnet build E4EDataManagement.Native/E4EDataManagement.Native.csproj
        dotnet build E4EDataManagement.UI/E4EDataManagement.UI.csproj -p:SkipNativeRustBuild=true
        dotnet build E4EDataManagement.Tests/E4EDataManagement.Tests.csproj -p:SkipNativeRustBuild=true

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"
