[project]
name = "e4e-data-management"
version = "0.5.1"
description = "E4E Data Management Tool (Python)"
authors = [
    {name = "Nathan Hui", email = "nthui@ucsd.edu"},
    {name = "Engineers for Exploration", email = "e4e@ucsd.edu"},
]
license = {text = "UCSD"}
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "appdirs>=1.4.4",
    "rich>=13.0.0",
    "wakepy>=0.10.1",
]

[project.scripts]
e4edm = "e4e_data_management.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.3.2",
    "coverage>=7.6.1",
    "pylint>=3.2.6",
    "wheel>=0.44.0",
    "python-semantic-release>=9.8.7",
    "autopep8>=2.3.1",
    "isort>=5.13.2",
    "maturin>=1.0",
]

[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[tool.maturin]
module-name = "e4e_data_management._core"
python-source = "."
features = ["pyo3/extension-module"]


[tool.semantic_release]
version_variables = ["e4e_data_management/__init__.py:__version__"]
version_toml = [
    "pyproject.toml:project.version",
]
assets = []
commit_message = "{version}\n\nAutomatically generated by python-semantic-release"
commit_parser = "angular"
logging_use_named_masks = false
major_on_zero = true
tag_format = "v{version}"

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease = false
prerelease_token = "rc"

[tool.semantic_release.changelog]
template_dir = "templates"
changelog_file = "CHANGELOG.md"
exclude_commit_patterns = []

[tool.semantic_release.changelog.environment]
block_start_string = "{%"
block_end_string = "%}"
variable_start_string = "{{"
variable_end_string = "}}"
comment_start_string = "{#"
comment_end_string = "#}"
trim_blocks = false
lstrip_blocks = false
newline_sequence = "\n"
keep_trailing_newline = false
extensions = []
autoescape = true

[tool.semantic_release.commit_author]
env = "GIT_COMMIT_AUTHOR"
default = "semantic-release <semantic-release>"

[tool.semantic_release.commit_parser_options]
allowed_tags = ["build", "chore", "ci", "docs", "feat", "fix", "perf", "style", "refactor", "test"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]

[tool.semantic_release.remote]
name = "origin"
type = "github"
ignore_token_for_push = false

[tool.semantic_release.remote.token]
env = "GH_TOKEN"

[tool.semantic_release.publish]
dist_glob_patterns = ["dist/*"]
upload_to_vcs_release = true
